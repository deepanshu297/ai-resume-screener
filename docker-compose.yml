version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - backend_uploads:/app/uploads
      - backend_database:/app/database
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:///./database/resume_screener.db
      - UPLOAD_DIR=./uploads
      - FAISS_INDEX_DIR=./database/faiss_indices
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: always

volumes:
  backend_uploads:
  backend_database:
